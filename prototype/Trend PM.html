<!doctype html><html lang="ar" dir="rtl" data-theme="dark"><head><meta charset="utf-8"/><title>Trend PM</title><meta name="viewport" content="width=1440"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Readex+Pro:wght@300;400;500;600&family=Cairo:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>/* ========== Trend PM · Editorial dense ========== */
:root {
  --accent-h: 162;
  --accent: oklch(0.72 0.14 var(--accent-h));
  --accent-fg: oklch(0.22 0.05 var(--accent-h));
  --accent-soft: oklch(0.72 0.14 var(--accent-h) / 0.12);

  --radius: 6px;
  --radius-sm: 4px;
  --row: 32px;

  --font-ar: "IBM Plex Sans Arabic", system-ui, sans-serif;
  --font-en: "IBM Plex Sans", system-ui, sans-serif;
  --font-mono: "IBM Plex Mono", ui-monospace, monospace;

  --fs-xxs: 10.5px;
  --fs-xs: 11.5px;
  --fs-sm: 12.5px;
  --fs-md: 13.5px;
  --fs-lg: 15.5px;
  --fs-xl: 19px;
  --fs-2xl: 28px;
}

/* Dark (default) */
[data-theme="dark"] {
  --bg: #08090A;
  --panel: #0C0D0F;
  --panel-2: #101214;
  --elevated: #14161A;
  --hover: #181A1E;
  --border: #1C1E22;
  --border-strong: #262A2F;
  --text: #E6E6E3;
  --text-2: #A8AAA6;
  --text-3: #6E7074;
  --text-4: #484A4E;

  --s-todo: #71717A;
  --s-progress: #8B5CF6;
  --s-review: #38BDF8;
  --s-blocked: #F43F5E;
  --s-done: oklch(0.72 0.14 var(--accent-h));
  --s-late: #F59E0B;

  --p-low: #71717A;
  --p-med: #38BDF8;
  --p-high: #F59E0B;
  --p-crit: #F43F5E;
}

[data-theme="light"] {
  --bg: #FBFBFA;
  --panel: #FFFFFF;
  --panel-2: #F7F7F5;
  --elevated: #FFFFFF;
  --hover: #F2F2F0;
  --border: #E6E5E0;
  --border-strong: #D4D3CE;
  --text: #16181B;
  --text-2: #52555A;
  --text-3: #7A7D82;
  --text-4: #ABADB1;

  --s-todo: #6B6F76;
  --s-progress: #7C3AED;
  --s-review: #0284C7;
  --s-blocked: #E11D48;
  --s-done: oklch(0.55 0.12 var(--accent-h));
  --s-late: #D97706;

  --p-low: #6B6F76;
  --p-med: #0284C7;
  --p-high: #D97706;
  --p-crit: #E11D48;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg); color: var(--text);
  font-family: var(--font-ar);
  font-size: var(--fs-sm);
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01", "cv11";
}
body { overflow: hidden; }

[dir="rtl"] { font-family: var(--font-ar); }
[dir="ltr"] { font-family: var(--font-en); }

.mono, .num { font-family: var(--font-mono); font-feature-settings: "tnum"; font-variant-numeric: tabular-nums; }
.en { font-family: var(--font-en); }

button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
input, textarea { font: inherit; color: inherit; background: none; border: 0; outline: 0; }
a { color: inherit; text-decoration: none; }

/* ---------- Layout ---------- */
.app {
  display: grid;
  grid-template-columns: 232px 1fr;
  grid-template-rows: 40px 1fr;
  height: 100vh;
  width: 100vw;
}
[dir="rtl"] .app { grid-template-columns: 232px 1fr; }

.topbar {
  grid-column: 1 / -1;
  display: flex; align-items: center;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
  padding: 0 10px;
  gap: 8px;
  height: 40px;
  position: relative;
  z-index: 20;
}
.sidebar {
  border-inline-end: 1px solid var(--border);
  background: var(--panel);
  overflow-y: auto;
  padding: 10px 8px 20px;
}
.main {
  overflow: hidden;
  display: flex; flex-direction: column;
  background: var(--bg);
}

/* ---------- Atoms ---------- */
.hairline { border-top: 1px solid var(--border); }
.v-hairline { border-inline-start: 1px solid var(--border); }

.chip {
  display: inline-flex; align-items: center; gap: 5px;
  height: 20px; padding: 0 7px;
  border-radius: 4px;
  background: var(--hover);
  color: var(--text-2);
  font-size: var(--fs-xs);
  border: 1px solid var(--border);
  white-space: nowrap;
}
.chip.accent { background: var(--accent-soft); color: var(--accent); border-color: transparent; }
.chip .dot { width: 6px; height: 6px; border-radius: 2px; flex-shrink: 0; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: 26px; padding: 0 10px;
  border-radius: var(--radius-sm);
  background: var(--hover);
  color: var(--text);
  font-size: var(--fs-sm);
  border: 1px solid var(--border);
  transition: background 0.12s;
}
.btn:hover { background: var(--elevated); border-color: var(--border-strong); }
.btn.primary { background: var(--accent); color: var(--accent-fg); border-color: transparent; font-weight: 500; }
.btn.primary:hover { filter: brightness(1.05); }
.btn.ghost { background: transparent; border-color: transparent; color: var(--text-2); }
.btn.ghost:hover { background: var(--hover); color: var(--text); }
.btn.sm { height: 22px; padding: 0 8px; font-size: var(--fs-xs); }
.btn.icon { width: 26px; padding: 0; justify-content: center; }
.btn.icon.sm { width: 22px; }

.kbd {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 16px; height: 16px; padding: 0 4px;
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-3);
}

.label {
  font-size: var(--fs-xxs);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-3);
  font-weight: 500;
}
[dir="rtl"] .label { letter-spacing: 0; }

.divider-h { height: 1px; background: var(--border); }

.avatar {
  width: 20px; height: 20px;
  border-radius: 999px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--panel-2);
  border: 1px solid var(--border);
  font-size: 10px;
  font-family: var(--font-en);
  font-weight: 500;
  color: var(--text-2);
  flex-shrink: 0;
}
.avatar.md { width: 24px; height: 24px; font-size: 11px; }
.avatar.lg { width: 32px; height: 32px; font-size: 12px; }
.avatar-stack { display: inline-flex; }
.avatar-stack .avatar + .avatar { margin-inline-start: -6px; }

/* ---------- Status dots ---------- */
.sdot {
  width: 10px; height: 10px; border-radius: 999px;
  border: 2px solid currentColor;
  display: inline-block; flex-shrink: 0;
  background: transparent;
  box-sizing: border-box;
}
.sdot.todo { color: var(--s-todo); }
.sdot.progress { color: var(--s-progress); background: conic-gradient(currentColor 50%, transparent 50%); border-color: currentColor; }
.sdot.review { color: var(--s-review); background: conic-gradient(currentColor 75%, transparent 75%); }
.sdot.blocked { color: var(--s-blocked); background: currentColor; }
.sdot.done { color: var(--s-done); background: currentColor; }

.pdot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; }
.pdot.low { background: var(--p-low); }
.pdot.med { background: var(--p-med); }
.pdot.high { background: var(--p-high); }
.pdot.crit { background: var(--p-crit); }

/* ---------- Sidebar ---------- */
.sb-section { margin-top: 14px; }
.sb-section:first-child { margin-top: 0; }
.sb-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 2px 6px 4px;
  color: var(--text-3);
  font-size: var(--fs-xxs);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
[dir="rtl"] .sb-head { letter-spacing: 0; }
.sb-item {
  display: flex; align-items: center; gap: 8px;
  padding: 0 8px;
  height: 26px;
  border-radius: var(--radius-sm);
  color: var(--text-2);
  font-size: var(--fs-sm);
  cursor: pointer;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sb-item:hover { background: var(--hover); color: var(--text); }
.sb-item.active { background: var(--hover); color: var(--text); }
.sb-item .icon { width: 14px; height: 14px; color: var(--text-3); flex-shrink: 0; }
.sb-item.active .icon { color: var(--accent); }
.sb-item .tail { margin-inline-start: auto; font-size: var(--fs-xxs); color: var(--text-4); font-family: var(--font-mono); }

.sb-proj-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

/* ---------- Topbar ---------- */
.brand {
  display: flex; align-items: center; gap: 8px;
  font-size: var(--fs-md);
  font-weight: 600;
  padding: 0 6px;
  min-width: 216px;
}
.brand .logo {
  width: 20px; height: 20px;
  background: var(--accent);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  color: var(--accent-fg);
  font-family: var(--font-en);
  font-weight: 700;
  font-size: 11px;
}
.crumb {
  display: flex; align-items: center; gap: 6px;
  color: var(--text-2);
  font-size: var(--fs-sm);
}
.crumb .sep { color: var(--text-4); }
.crumb .cur { color: var(--text); }

.topbar .spacer { flex: 1; }

.search-pill {
  display: inline-flex; align-items: center; gap: 6px;
  height: 26px;
  padding: 0 8px;
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-3);
  font-size: var(--fs-sm);
  min-width: 260px;
  cursor: pointer;
}
.search-pill:hover { border-color: var(--border-strong); }
.search-pill .spacer { flex: 1; }

/* ---------- Content subheader ---------- */
.subhead {
  height: 44px;
  display: flex; align-items: center; gap: 10px;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
  flex-shrink: 0;
}
.subhead h1 {
  margin: 0;
  font-size: var(--fs-md);
  font-weight: 600;
}
.subhead .sub {
  color: var(--text-3);
  font-size: var(--fs-xs);
}

.toolbar {
  height: 36px;
  display: flex; align-items: center; gap: 6px;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
  flex-shrink: 0;
}

.tabs {
  display: inline-flex; gap: 0;
}
.tab {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 0 10px;
  height: 26px;
  border-radius: var(--radius-sm);
  color: var(--text-3);
  font-size: var(--fs-sm);
  border: 1px solid transparent;
}
.tab:hover { color: var(--text); background: var(--hover); }
.tab.active { color: var(--text); background: var(--hover); border-color: var(--border); }
.tab .count { color: var(--text-4); font-family: var(--font-mono); font-size: var(--fs-xxs); }

.scroll { overflow: auto; flex: 1; min-height: 0; }

/* ---------- Panels ---------- */
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.panel-head {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
.panel-head h3 {
  margin: 0; font-size: var(--fs-sm); font-weight: 600;
}
.panel-head .tail { margin-inline-start: auto; color: var(--text-3); font-size: var(--fs-xs); }
.panel-body { padding: 12px; }

/* ---------- Dashboard grid ---------- */
.dash {
  padding: 16px;
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 12px;
  min-height: 100%;
}
.col-12 { grid-column: span 12; }
.col-8 { grid-column: span 8; }
.col-6 { grid-column: span 6; }
.col-4 { grid-column: span 4; }
.col-3 { grid-column: span 3; }

.kpi {
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--panel);
  display: flex; flex-direction: column; gap: 4px;
  min-height: 82px;
}
.kpi .kpi-label { font-size: var(--fs-xxs); text-transform: uppercase; color: var(--text-3); letter-spacing: 0.06em; }
[dir="rtl"] .kpi .kpi-label { letter-spacing: 0; }
.kpi .kpi-value {
  font-family: var(--font-en);
  font-size: var(--fs-2xl);
  font-weight: 500;
  line-height: 1.1;
  letter-spacing: -0.02em;
  font-feature-settings: "tnum";
}
.kpi .kpi-sub {
  display: flex; align-items: center; gap: 6px;
  font-size: var(--fs-xs);
  color: var(--text-3);
  margin-top: auto;
}
.kpi .trend-up { color: var(--accent); }
.kpi .trend-down { color: var(--s-blocked); }

/* ---------- Table ---------- */
.tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--fs-sm);
}
.tbl th, .tbl td {
  text-align: start;
  padding: 0 10px;
  height: var(--row);
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.tbl th {
  font-weight: 500;
  color: var(--text-3);
  font-size: var(--fs-xxs);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  background: var(--panel);
  position: sticky; top: 0; z-index: 1;
  border-bottom: 1px solid var(--border);
}
[dir="rtl"] .tbl th { letter-spacing: 0; }
.tbl tr:hover td { background: var(--hover); }
.tbl td.num, .tbl th.num { font-family: var(--font-mono); font-feature-settings: "tnum"; }
.tbl td.tight { padding: 0 6px; }

.progress {
  position: relative;
  height: 5px;
  background: var(--hover);
  border-radius: 2px;
  overflow: hidden;
  width: 100%;
  min-width: 60px;
}
.progress > i {
  position: absolute; inset-inline-start: 0; top: 0; bottom: 0;
  background: var(--accent);
  display: block;
}
.progress.thin { height: 3px; }

/* ---------- Kanban ---------- */
.kanban {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: 280px;
  gap: 12px;
  padding: 12px 16px;
  height: 100%;
  overflow-x: auto;
  align-content: start;
}
.col {
  display: flex; flex-direction: column;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  max-height: 100%;
  min-height: 200px;
}
.col-head {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
}
.col-head .count {
  font-family: var(--font-mono);
  font-size: var(--fs-xxs);
  color: var(--text-3);
  margin-inline-start: auto;
}
.col-body {
  padding: 8px;
  display: flex; flex-direction: column; gap: 6px;
  overflow-y: auto;
  flex: 1;
  min-height: 0;
}
.col-body.drop-over { background: var(--accent-soft); }

.tcard {
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 9px;
  display: flex; flex-direction: column; gap: 6px;
  cursor: grab;
  transition: border-color 0.1s, background 0.1s;
}
.tcard:hover { border-color: var(--border-strong); }
.tcard:active { cursor: grabbing; }
.tcard.dragging { opacity: 0.4; }
.tcard .tcard-head {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font-mono);
  font-size: var(--fs-xxs);
  color: var(--text-3);
}
.tcard .tcard-head .tail { margin-inline-start: auto; display: flex; gap: 4px; align-items: center; }
.tcard .tcard-title {
  font-size: var(--fs-sm);
  line-height: 1.35;
  color: var(--text);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.tcard .tcard-meta {
  display: flex; align-items: center; gap: 6px;
  font-size: var(--fs-xxs);
  color: var(--text-3);
}
.tcard .tcard-meta .tail { margin-inline-start: auto; display: flex; align-items: center; gap: 4px; }

/* ---------- Side panel ---------- */
.side {
  position: absolute; top: 40px; bottom: 0;
  inset-inline-end: 0;
  width: 440px;
  background: var(--panel);
  border-inline-start: 1px solid var(--border);
  display: flex; flex-direction: column;
  z-index: 30;
  animation: slideIn 0.18s ease-out;
}
[dir="ltr"] .side { animation: slideInLtr 0.18s ease-out; }
@keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes slideInLtr { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.side-head {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
.side-body {
  flex: 1; overflow-y: auto;
  padding: 14px 16px;
}
.side-row {
  display: grid;
  grid-template-columns: 100px 1fr;
  gap: 10px;
  padding: 6px 0;
  font-size: var(--fs-sm);
  align-items: center;
}
.side-row > .k { color: var(--text-3); font-size: var(--fs-xs); }
.side-row > .v { color: var(--text); }

.comment {
  display: flex; gap: 8px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.comment .c-body { flex: 1; }
.comment .c-head { display: flex; align-items: center; gap: 6px; font-size: var(--fs-xs); color: var(--text-3); }
.comment .c-head .who { color: var(--text); font-weight: 500; }
.comment .c-text { margin-top: 4px; font-size: var(--fs-sm); color: var(--text); }

/* ---------- Command palette ---------- */
.cmdk-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 100;
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 13vh;
}
.cmdk {
  width: 560px; max-width: 90vw;
  background: var(--panel);
  border: 1px solid var(--border-strong);
  border-radius: 8px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  overflow: hidden;
}
.cmdk-input {
  width: 100%;
  height: 44px;
  padding: 0 16px;
  background: transparent;
  border: 0;
  outline: 0;
  color: var(--text);
  font-size: var(--fs-md);
  border-bottom: 1px solid var(--border);
}
.cmdk-list { max-height: 360px; overflow-y: auto; padding: 6px; }
.cmdk-group-label { padding: 8px 10px 4px; font-size: var(--fs-xxs); text-transform: uppercase; color: var(--text-3); letter-spacing: 0.06em; }
.cmdk-item {
  display: flex; align-items: center; gap: 10px;
  padding: 0 10px; height: 32px;
  border-radius: var(--radius-sm);
  color: var(--text-2); font-size: var(--fs-sm);
}
.cmdk-item.active { background: var(--hover); color: var(--text); }
.cmdk-item .tail { margin-inline-start: auto; color: var(--text-4); font-size: var(--fs-xxs); font-family: var(--font-mono); }

/* ---------- Menus / dropdowns ---------- */
.menu {
  position: absolute;
  background: var(--panel);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  min-width: 180px;
  padding: 4px;
  z-index: 50;
}
.menu-item {
  display: flex; align-items: center; gap: 8px;
  padding: 0 8px; height: 28px;
  border-radius: var(--radius-sm);
  font-size: var(--fs-sm);
  color: var(--text-2);
  cursor: pointer;
}
.menu-item:hover { background: var(--hover); color: var(--text); }
.menu-item.active { color: var(--text); }
.menu-item .tail { margin-inline-start: auto; color: var(--text-4); font-family: var(--font-mono); font-size: var(--fs-xxs); }

/* ---------- Gantt ---------- */
.gantt {
  display: grid;
  grid-template-columns: 280px 1fr;
  height: 100%;
  overflow: auto;
  background: var(--panel);
}
.gantt-left, .gantt-right { min-height: 100%; }
.gantt-left {
  border-inline-end: 1px solid var(--border);
  background: var(--panel);
  position: sticky; inset-inline-start: 0;
  z-index: 2;
}
.gantt-row {
  display: flex; align-items: center;
  height: 30px;
  padding: 0 10px;
  border-bottom: 1px solid var(--border);
  font-size: var(--fs-sm);
  gap: 8px;
  white-space: nowrap;
}
.gantt-row.group { background: var(--panel-2); font-weight: 500; color: var(--text-2); font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: 0.04em; }
[dir="rtl"] .gantt-row.group { letter-spacing: 0; }

.gantt-header {
  display: flex;
  height: 30px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--panel); z-index: 3;
}
.gantt-header .gh-cell {
  border-inline-end: 1px solid var(--border);

const CommandPalette = ({ open, onClose, onGo, lang, t }) => {
  const [q, setQ] = useState("");
  const [sel, setSel] = useState(0);
  const inputRef = useRef();

  useEffect(() => {
    if (open) { setTimeout(() => inputRef.current?.focus(), 10); setQ(""); setSel(0); }
  }, [open]);

  const items = useMemo(() => {
    const nav = [
      { g: lang === "ar" ? "الانتقال" : "Go to", label: t.dashboard, action: () => onGo({ type: "dash" }), kbd: "G D" },
      { g: lang === "ar" ? "الانتقال" : "Go to", label: t.myTasks, action: () => onGo({ type: "mytasks" }), kbd: "G M" },
      { g: lang === "ar" ? "الانتقال" : "Go to", label: t.workload, action: () => onGo({ type: "workload" }), kbd: "G W" },
      { g: lang === "ar" ? "الانتقال" : "Go to", label: t.analytics, action: () => onGo({ type: "analytics" }), kbd: "G A" },
    ];
    const projs = PROJECTS.map(p => ({
      g: lang === "ar" ? "المشاريع" : "Projects",
      label: (lang === "ar" ? p.name : p.en),
      color: p.color,
      action: () => onGo({ type: "project", id: p.id, sub: "board" }),
      kbd: p.key,
    }));
    const tasks = TASKS.slice(0, 20).map(tk => ({
      g: lang === "ar" ? "المهام" : "Tasks",
      label: tk.title,
      kbd: tk.id,
      action: () => onGo({ type: "project", id: tk.projectId, sub: "board", taskId: tk.id }),
    }));
    const actions = [
      { g: lang === "ar" ? "إجراءات" : "Actions", label: t.newTask, kbd: "C T", action: () => {} },
      { g: lang === "ar" ? "إجراءات" : "Actions", label: t.newProject, kbd: "C P", action: () => {} },
      { g: lang === "ar" ? "إجراءات" : "Actions", label: lang === "ar" ? "تبديل الوضع الداكن" : "Toggle dark mode", kbd: "⌘ \\", action: () => {} },
    ];
    const all = [...nav, ...projs, ...tasks, ...actions];
    if (!q.trim()) return all;
    const Q = q.toLowerCase();
    return all.filter(x => x.label.toLowerCase().includes(Q) || (x.kbd || "").toLowerCase().includes(Q));
  }, [q, lang]);

  const grouped = useMemo(() => {
    const g = {};
    items.forEach((it, i) => { (g[it.g] ||= []).push({ ...it, _i: i }); });
    return g;
  }, [items]);

  useEffect(() => {
    if (!open) return;
    const h = (e) => {
      if (e.key === "Escape") onClose();
      else if (e.key === "ArrowDown") { e.preventDefault(); setSel(s => Math.min(items.length - 1, s + 1)); }
      else if (e.key === "ArrowUp") { e.preventDefault(); setSel(s => Math.max(0, s - 1)); }
      else if (e.key === "Enter") { e.preventDefault(); const it = items[sel]; if (it) { it.action(); onClose(); } }
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [open, items, sel]);

  if (!open) return null;
  return (
    <div className="cmdk-backdrop" onClick={onClose}>
      <div className="cmdk" onClick={e => e.stopPropagation()}>
        <input ref={inputRef} className="cmdk-input" placeholder={lang === "ar" ? "اكتب أمراً أو ابحث…" : "Type a command or search…"} value={q} onChange={e => { setQ(e.target.value); setSel(0); }} />
        <div className="cmdk-list">
          {items.length === 0 && <div style={{ padding: 20, textAlign: "center", color: "var(--text-3)" }}>{t.noResults}</div>}
          {Object.entries(grouped).map(([g, arr]) => (
            <div key={g}>
              <div className="cmdk-group-label">{g}</div>
              {arr.map(it => (
                <div key={it._i} className={"cmdk-item" + (it._i === sel ? " active" : "")}
                     onMouseEnter={() => setSel(it._i)}
                     onClick={() => { it.action(); onClose(); }}>
                  {it.color && <span style={{ width: 8, height: 8, borderRadius: 2, background: it.color, flexShrink: 0 }} />}
                  <span className="truncate">{it.label}</span>
                  {it.kbd && <span className="tail">{it.kbd}</span>}
                </div>
              ))}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

// ——— Sparkline / small charts ———
const Sparkline = ({ data, w = 120, h = 28, color = "var(--accent)" }) => {
  const max = Math.max(...data), min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / range) * (h - 4) - 2;
    return [x, y];
  });
  const path = "M " + pts.map(p => p.join(" ")).join(" L ");
  const area = path + ` L ${w} ${h} L 0 ${h} Z`;
  return (
    <svg className="chart" width={w} height={h} style={{ display: "block" }}>
      <path d={area} fill={color} className="chart-area" />
      <path d={path} stroke={color} className="chart-line" />
    </svg>
  );
};

// ——— Velocity chart ———
const VelocityChart = ({ lang, t }) => {
  const data = [18, 22, 19, 24, 27, 23, 29, 31];
  const w = 540, h = 160, p = 28;
  const max = Math.max(...data) * 1.2;
  const bw = (w - p * 2) / data.length;
  return (
    <svg className="chart" viewBox={`0 0 ${w} ${h}`} style={{ width: "100%", height: h }}>
      {[0, 0.25, 0.5, 0.75, 1].map(r => {
        const y = p + (h - p * 2) * (1 - r);
        return <g key={r}><line x1={p} x2={w - p} y1={y} y2={y} className="chart-grid" /><text x={p - 6} y={y + 3} textAnchor="end" className="chart-axis">{Math.round(max * r)}</text></g>;
      })}
      {data.map((v, i) => {
        const bh = (v / max) * (h - p * 2);
        const x = p + i * bw + 4;
        const y = h - p - bh;
        return <g key={i}>
          <rect x={x} y={y} width={bw - 8} height={bh} fill="var(--accent)" opacity={i === data.length - 1 ? 1 : 0.5} rx="2" />
          <text x={x + (bw - 8) / 2} y={h - p + 12} textAnchor="middle" className="chart-axis">W{i + 1}</text>
        </g>;
      })}
    </svg>
  );
};

// ——— Burn-down — dual line ———
const BurnDown = ({ lang }) => {
  const ideal = [100, 88, 75, 63, 50, 38, 25, 13, 0];
  const actual = [100, 92, 84, 78, 68, 58, 52, 44];
  const w = 540, h = 140, p = 24;
  const max = 100;
  const xStep = (w - p * 2) / (ideal.length - 1);
  const toPath = (arr) => "M " + arr.map((v, i) => `${p + i * xStep} ${p + (1 - v / max) * (h - p * 2)}`).join(" L ");
  return (
    <svg className="chart" viewBox={`0 0 ${w} ${h}`} style={{ width: "100%", height: h }}>
      {[0, 0.5, 1].map(r => {
        const y = p + (h - p * 2) * (1 - r);
        return <line key={r} x1={p} x2={w - p} y1={y} y2={y} className="chart-grid" />;
      })}
      <path d={toPath(ideal)} stroke="var(--text-4)" strokeDasharray="3 3" fill="none" strokeWidth="1" />
      <path d={toPath(actual)} stroke="var(--accent)" fill="none" strokeWidth="1.5" />
      {actual.map((v, i) => <circle key={i} cx={p + i * xStep} cy={p + (1 - v / max) * (h - p * 2)} r="2" fill="var(--accent)" />)}
    </svg>
  );
};

    </div>

};

// ——— Gantt ———
const GanttView = ({ p, lang, t, openTask, allProjects }) => {
  const tasks = (allProjects ? TASKS : tasksOf(p.id)).filter(x => x.start && x.due);
  // Determine date range
  const allStarts = tasks.map(x => D(x.start));
  const allDues = tasks.map(x => D(x.due));
  const minD = new Date(Math.min(...allStarts));
  const maxD = new Date(Math.max(...allDues));
  minD.setDate(minD.getDate() - 3);
  maxD.setDate(maxD.getDate() + 3);
  const dayW = 18;
  const totalDays = daysBetween(minD.toISOString().slice(0,10), maxD.toISOString().slice(0,10));
  const width = totalDays * dayW;

  // Group by week for header
  const weeks = [];
  const cur = new Date(minD);
  while (cur <= maxD) {
    weeks.push({ d: new Date(cur), label: `${String(cur.getDate()).padStart(2,"0")}.${String(cur.getMonth()+1).padStart(2,"0")}` });
    cur.setDate(cur.getDate() + 7);
  }

  const todayOffset = daysBetween(minD.toISOString().slice(0,10), TODAY.toISOString().slice(0,10)) * dayW;

  const posFor = (tk) => {
    const off = daysBetween(minD.toISOString().slice(0,10), tk.start) * dayW;
    const w = (daysBetween(tk.start, tk.due) + 1) * dayW;
    return { left: off, width: Math.max(w, 12) };
  };

  return (
    <div className="gantt" dir={lang === "ar" ? "rtl" : "ltr"}>
      <div className="gantt-left">
        <div className="gantt-header" style={{ padding: "0 10px", alignItems: "center" }}>
          <span style={{ fontSize: "var(--fs-xxs)", textTransform: "uppercase", color: "var(--text-3)", letterSpacing: "0.04em" }}>{lang === "ar" ? "المهمة" : "Task"}</span>
        </div>
        <div className="gantt-body">
          {tasks.map(tk => (
            <div key={tk.id} className="gantt-row" onClick={() => openTask(tk.id)} style={{ cursor: "pointer" }}>
              <StatusDot s={tk.status} />
              <span className="mono" style={{ fontSize: "var(--fs-xxs)", color: "var(--text-4)", width: 48, flexShrink: 0 }}>{tk.id}</span>
              <span className="truncate" style={{ flex: 1 }}>{tk.title}</span>
              <AvatarStack users={tk.assignees.map(userById).filter(Boolean)} max={2} />
            </div>
          ))}
        </div>
      </div>
      <div className="gantt-right" style={{ position: "relative", minWidth: width }}>
        <div className="gantt-header" style={{ width }}>
          {weeks.map((w, i) => (
            <div key={i} className="gh-cell" style={{ width: 7 * dayW }}>{w.label}</div>
          ))}
        </div>
        <div className="gantt-body" style={{ width, position: "relative" }}>
          {todayOffset > 0 && todayOffset < width && <div className="gantt-today" style={{ insetInlineStart: todayOffset }} />}
          {tasks.map(tk => {
            const { left, width: w } = posFor(tk);
            const late = isLate(tk);
            return (
              <div key={tk.id} className="gantt-track" onClick={() => openTask(tk.id)} style={{ cursor: "pointer" }}>
                <div className={"gantt-bar " + tk.status + (late ? " late" : "")}
                     style={{ insetInlineStart: left, width: w }}
                     title={tk.title}>
                  {w > 80 && <span className="truncate" style={{ fontFamily: "var(--font-ar)", fontSize: 10 }}>{tk.title}</span>}
                  {tk.progress > 0 && tk.progress < 100 && (
                    <div style={{ position: "absolute", inset: 0, background: `linear-gradient(to right, rgba(0,0,0,0.25) ${tk.progress}%, transparent ${tk.progress}%)` }} />
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

// ——— Calendar ———
const CalendarView = ({ p, lang, t, openTask, allProjects }) => {
  // April 2026
  const year = 2026, month = 3; // 0-indexed: 3 = April
  const first = new Date(year, month, 1);
  const startOffset = first.getDay(); // 0=Sun
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const cells = [];
  // Previous month filler
  for (let i = 0; i < startOffset; i++) {
    const d = new Date(year, month, -(startOffset - 1 - i));
    cells.push({ d, other: true });
  }
  for (let i = 1; i <= daysInMonth; i++) cells.push({ d: new Date(year, month, i), other: false });
  while (cells.length % 7 !== 0 || cells.length < 35) cells.push({ d: new Date(year, month + 1, cells.length - daysInMonth - startOffset + 1), other: true });

  const tasks = allProjects ? TASKS : tasksOf(p.id);

  return (
    <div className="cal">
      <div style={{ display: "flex", alignItems: "center", gap: 10, paddingBottom: 8 }}>
        <button className="btn icon sm"><Icon name="chevLeft" size={12} style={{ transform: lang === "ar" ? "rotate(180deg)" : "none" }} /></button>
        <span style={{ fontSize: "var(--fs-md)", fontWeight: 600 }}>{t.months[month]} {year}</span>
        <button className="btn icon sm"><Icon name="chevRight" size={12} style={{ transform: lang === "ar" ? "rotate(180deg)" : "none" }} /></button>
        <div style={{ marginInlineStart: "auto", display: "flex", gap: 4 }}>
          <button className="btn sm" style={{ background: "var(--panel)" }}>{t.month}</button>
          <button className="btn sm ghost">{t.week}</button>
        </div>
      </div>
      <div style={{ display: "flex", flexDirection: "column", flex: 1, minHeight: 0 }}>
        <div className="cal-head">{t.days.map((d, i) => <div key={i}>{d}</div>)}</div>
        <div className="cal-grid" style={{ flex: 1 }}>
          {cells.map((c, i) => {
            const iso = c.d.toISOString().slice(0,10);
            const today = iso === TODAY.toISOString().slice(0,10);
            const dayTasks = tasks.filter(x => x.due === iso);
            return (
              <div key={i} className={"cal-cell" + (c.other ? " other" : "") + (today ? " today" : "")}>
                <div style={{ display: "flex", alignItems: "center" }}>
                  <span className="d">{c.d.getDate()}</span>
                  {today && <span className="chip accent" style={{ height: 14, fontSize: 9, marginInlineStart: 6 }}>{t.today}</span>}
                </div>
                {dayTasks.slice(0, 4).map(tk => (
                  <div key={tk.id} className={"ev " + tk.status} onClick={() => openTask(tk.id)} style={{ cursor: "pointer" }}>
                    {tk.id} · {tk.title}
                  </div>
                ))}
                {dayTasks.length > 4 && <span style={{ fontSize: "var(--fs-xxs)", color: "var(--text-4)" }}>+{dayTasks.length - 4}</span>}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

// r

// ——— Workload View ———
const WorkloadView = ({ lang, t, openTask }) => {
  // Week of TODAY (2026-04-16 Thu) — show Sun 2026-04-12 through Sat 2026-04-18
  const weekStart = new Date("2026-04-12");
  const days = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(weekStart); d.setDate(d.getDate() + i); return d;
  });

  const rows = TEAM.map(u => {
    const tasks = TASKS.filter(tk => tk.assignees.includes(u.id) && tk.status !== "done" && tk.start && tk.due);
    // Per day buckets
    const byDay = days.map(d => {
      const iso = d.toISOString().slice(0, 10);
      return tasks.filter(tk => tk.start <= iso && tk.due >= iso);
    });
    const totalHrs = tasks.reduce((s, tk) => s + (tk.est - (tk.spent || 0)) / Math.max(1, daysBetween(tk.start, tk.due) + 1) * 5, 0);
    return { u, tasks, byDay, hrs: Math.round(totalHrs) };
  });

  return (
    <div className="scroll">
      <div className="subhead">
        <h1>{t.workload}</h1>
        <span className="sub">· {lang === "ar" ? "الأسبوع" : "Week of"} {formatShort(weekStart.toISOString().slice(0,10))}</span>
        <div style={{ marginInlineStart: "auto", display: "flex", gap: 6 }}>
          <button className="btn sm"><Icon name="chevLeft" size={12} style={{ transform: lang === "ar" ? "rotate(180deg)" : "none" }} /></button>
          <button className="btn sm">{lang === "ar" ? "هذا الأسبوع" : "This week"}</button>
          <button className="btn sm"><Icon name="chevRight" size={12} style={{ transform: lang === "ar" ? "rotate(180deg)" : "none" }} /></button>
          <button className="btn sm"><Icon name="filter" size={12} /> {t.filter}</button>
        </div>
      </div>
      <div className="wl-head">
        <div className="wl-name">{lang === "ar" ? "عضو الفريق" : "Team member"}</div>
        {days.map((d, i) => (
          <div key={i} className="wl-day">
            <div>{t.days[d.getDay()]}</div>
            <div style={{ color: d.toISOString().slice(0,10) === TODAY.toISOString().slice(0,10) ? "var(--accent)" : "var(--text-2)", fontSize: "var(--fs-xs)" }}>{String(d.getDate()).padStart(2,"0")}</div>
          </div>
        ))}
      </div>
      {rows.map(({ u, byDay, hrs }) => {
        const over = hrs > 40;
        return (
          <div key={u.id} className="wl-row">
            <div className="wl-name">
              <Avatar user={u} size="md" />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div className="truncate" style={{ fontSize: "var(--fs-sm)" }}>{lang === "ar" ? u.name : u.en}</div>
                <div className="meta truncate">{u.role} · <span className="mono">{hrs}h/40h</span></div>
              </div>
            </div>
            {byDay.map((tasks, i) => {
              const dayHrs = tasks.length * 2 + tasks.reduce((s, t) => s + (t.priority === "crit" ? 2 : 0), 0);
              const dayOver = dayHrs > 8;
              return (
                <div key={i} className="wl-day" style={{ background: dayOver ? "color-mix(in oklch, var(--s-blocked) 6%, transparent)" : "transparent" }}>
                  <span className={"wl-load" + (dayOver ? " over" : "")}>{dayHrs}h</span>
                  {tasks.slice(0, 3).map(tk => {
                    const p = projectById(tk.projectId);
                    return (
                      <div key={tk.id} className={"wl-bar" + (dayOver ? " over" : "")}
                           onClick={() => openTask(tk.id)}
                           style={{ cursor: "pointer", borderColor: p.color }}
                           title={tk.title}>
                        <span className="mono" style={{ fontSize: 9, color: "var(--text-4)", marginInlineEnd: 4 }}>{tk.id}</span>
                        {tk.title}
                      </div>
                    );
                  })}
                  {tasks.length > 3 && <span style={{ fontSize: 9, color: "var(--text-4)" }}>+{tasks.length - 3}</span>}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
};

/* global React, ReactDOM, Sidebar, Topbar, CommandPalette, Tweaks, Dashboard, ProjectHeader, KanbanView, ListView, GanttView, CalendarView, TaskPanel, WorkloadView, MyTasksView, AnalyticsView, TASKS, T_AR, T_EN, projectById */

// r

const LS_KEY = "trendpm.state";

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": 162,
  "theme": "dark",
  "lang": "ar",
  "font": "plex"
}/*EDITMODE-END*/;

function App() {
  // Load persisted state
  const saved = (() => { try { return JSON.parse(localStorage.getItem(LS_KEY) || "{}"); } catch { return {}; } })();
  const [lang, setLang] = useState(saved.lang || TWEAK_DEFAULTS.lang);
  const [theme, setTheme] = useState(saved.theme || TWEAK_DEFAULTS.theme);
  const [accent, setAccent] = useState(saved.accent ?? TWEAK_DEFAULTS.accent);
  const [font, setFont] = useState(saved.font || TWEAK_DEFAULTS.font);
  const [view, setView] = useState(saved.view || { type: "dash" });
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [cmdkOpen, setCmdkOpen] = useState(false);
  const [openTaskId, setOpenTaskId] = useState(null);
  const [taskOverrides, setTaskOverrides] = useState(saved.taskOverrides || {});
  const [boardFilter, setBoardFilter] = useState("");

  const t = lang === "ar" ? T_AR : T_EN;

  // Persist
  useEffect(() => {
    localStorage.setItem(LS_KEY, JSON.stringify({ lang, theme, accent, font, view, taskOverrides }));
  }, [lang, theme, accent, font, view, taskOverrides]);

  // Apply theme / dir / accent
  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    document.documentElement.setAttribute("dir", lang === "ar" ? "rtl" : "ltr");
    document.documentElement.setAttribute("lang", lang);
    document.documentElement.style.setProperty("--accent-h", accent);
    const fontMap = {
      plex: { ar: '"IBM Plex Sans Arabic", system-ui, sans-serif', en: '"IBM Plex Sans", system-ui, sans-serif' },
      readex: { ar: '"Readex Pro", system-ui, sans-serif', en: '"Inter", system-ui, sans-serif' },
      cairo: { ar: '"Cairo", system-ui, sans-serif', en: '"Inter", system-ui, sans-serif' },
    };
    document.documentElement.style.setProperty("--font-ar", fontMap[font].ar);
    document.documentElement.style.setProperty("--font-en", fontMap[font].en);
  }, [theme, lang, accent, font]);

  // Tweaks host protocol
  useEffect(() => {
    const h = (e) => {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode") setTweaksOpen(true);
      else if (d.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", h);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", h);
  }, []);

  const pushTweak = (edits) => {
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits }, "*");
  };

  // Keyboard shortcuts
  useEffect(() => {
    const h = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") { e.preventDefault(); setCmdkOpen(true); }
      else if (e.key === "Escape") { setOpenTaskId(null); }
      else if (e.key === "g" && !e.target.closest("input,textarea")) { window._gPending = true; setTimeout(() => { window._gPending = false; }, 800); }
      else if (window._gPending && !e.target.closest("input,textarea")) {
        const k = e.key.toLowerCase();
        window._gPending = false;
        if (k === "d") setView({ type: "dash" });
        else if (k === "m") setView({ type: "mytasks" });
        else if (k === "w") setView({ type: "workload" });
        else if (k === "a") setView({ type: "analytics" });
      }
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, []);

  // Task ops
  const allTasks = useMemo(() => {
    return TASKS.map(t => taskOverrides[t.id] ? { ...t, ...taskOverrides[t.id] } : t);
  }, [taskOverrides]);

  // Patch the global TASKS reference lookup via the same array (simpler: override via rebuild)
  // Since our components read window.TASKS directly, we mutate on change.
  useEffect(() => {
    allTasks.forEach(at => {
      const orig = TASKS.find(x => x.id === at.id);
      if (orig) Object.assign(orig, at);
    });
  }, [allTasks]);

  const onChangeStatus = (taskId, newStatus) => {
    setTaskOverrides(o => ({ ...o, [taskId]: { ...(o[taskId] || {}), status: newStatus, progress: newStatus === "done" ? 100 : (o[taskId]?.progress ?? undefined) } }));
  };

  const onMoveTask = (taskId, newStatus) => onChangeStatus(taskId, newStatus);

  const openTask = (id) => setOpenTaskId(id);
  const currentTask = openTaskId ? TASKS.find(x => x.id === openTaskId) : null;

  // Render view
  const renderView = () => {
    if (view.type === "dash") return <Dashboard lang={lang} t={t} setView={setView} openTask={openTask} />;
    if (view.type === "mytasks") return <MyTasksView lang={lang} t={t} openTask={openTask} onChangeStatus={onChangeStatus} />;
    if (view.type === "workload") return <WorkloadView lang={lang} t={t} openTask={openTask} />;
    if (view.type === "analytics") return <AnalyticsView lang={lang} t={t} />;
    if (view.type === "project") {
      const p = projectById(view.id);
      if (!p) return null;
      const sub = view.sub || "board";
      return (
        <>
          <ProjectHeader p={p} sub={sub} setSub={(s) => setView({ ...view, sub: s })} lang={lang} t={t} filter={boardFilter} setFilter={setBoardFilter} />
          <div style={{ flex: 1, minHeight: 0, display: "flex", flexDirection: "column" }}>
            {sub === "board" && <KanbanView p={p} lang={lang} t={t} filter={boardFilter} openTask={openTask} onMove={onMoveTask} />}
            {sub === "list" && <ListView p={p} lang={lang} t={t} filter={boardFilter} openTask={openTask} onChangeStatus={onChangeStatus} />}
            {sub === "gantt" && <GanttView p={p} lang={lang} t={t} openTask={openTask} />}
            {sub === "calendar" && <CalendarView p={p} lang={lang} t={t} openTask={openTask} />}
          </div>
        </>
      );
    }
  };

  return (
    <div className="app">
      <Topbar view={view} lang={lang} setLang={(l) => { setLang(l); pushTweak({ lang: l }); }} theme={theme} setTheme={(x) => { setTheme(x); pushTweak({ theme: x }); }} openCmdk={() => setCmdkOpen(true)} t={t} />
      <Sidebar view={view} setView={setView} lang={lang} t={t} />
      <main className="main" style={{ position: "relative" }}>
        {renderView()}
        {currentTask && <TaskPanel task={currentTask} onClose={() => setOpenTaskId(null)} lang={lang} t={t} onChangeStatus={onChangeStatus} />}
      </main>
      <CommandPalette open={cmdkOpen} onClose={() => setCmdkOpen(false)} onGo={setView} lang={lang} t={t} />
      <Tweaks open={tweaksOpen}
              lang={lang} setLang={(l) => { setLang(l); pushTweak({ lang: l }); }}
              theme={theme} setTheme={(x) => { setTheme(x); pushTweak({ theme: x }); }}
              accent={accent} setAccent={(a) => { setAccent(a); pushTweak({ accent: a }); }}
              font={font} setFont={(f) => { setFont(f); pushTweak({ font: f }); }} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script></body></html>
